name: oci-publish

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v15

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Resolve image coordinates
        id: coords
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          tag="${GITHUB_REF_NAME//\//-}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build OCI archive with Nix
        id: build
        run: |
          set -euo pipefail
          archive="$(nix build .#ociImage --print-out-paths --no-link)"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Log in and push image with crane
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          nix shell nixpkgs#go-containerregistry -c crane auth login ghcr.io -u "$GITHUB_ACTOR" -p "$GITHUB_TOKEN"
          nix shell nixpkgs#go-containerregistry -c crane push "${{ steps.build.outputs.archive }}" "${{ steps.coords.outputs.image }}:${{ steps.coords.outputs.tag }}"
