name: docker-publish

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Wait for CI workflow success
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.sha;
            const timeoutMs = 20 * 60 * 1000;
            const pollIntervalMs = 15 * 1000;
            const startedAt = Date.now();

            while (Date.now() - startedAt < timeoutMs) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                head_sha: sha,
                event: "push",
                per_page: 20,
              });

              const matchingRuns = runs.data.workflow_runs
                .filter((run) => run.head_sha === sha)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              if (matchingRuns.length === 0) {
                core.info(`No CI run found for ${sha} yet; waiting...`);
                await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
                continue;
              }

              const run = matchingRuns[0];
              core.info(`CI run ${run.id} status=${run.status} conclusion=${run.conclusion ?? "n/a"}`);

              if (run.status !== "completed") {
                await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
                continue;
              }

              if (run.conclusion !== "success") {
                core.setFailed(`CI run ${run.id} concluded with '${run.conclusion}', blocking image publish.`);
              }
              return;
            }

            core.setFailed(`Timed out waiting for CI success for commit ${sha}.`);

      - name: Resolve image name
        id: image
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=tag

      - name: Validate publish tag contract
        env:
          RESOLVED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          expected_tag="${GITHUB_REF_NAME//\//-}"
          mapfile -t tags < <(printf "%s\n" "$RESOLVED_TAGS" | sed '/^$/d')
          if [ "${#tags[@]}" -ne 1 ]; then
            echo "expected exactly one publish tag, got ${#tags[@]}: ${tags[*]}" >&2
            exit 1
          fi
          actual_ref="${tags[0]}"
          actual_tag="${actual_ref##*:}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "expected publish tag '$expected_tag' but got '$actual_tag'" >&2
            exit 1
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
            type=gha,scope=${{ github.workflow }}-main
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ github.ref_name }}
