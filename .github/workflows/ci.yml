name: ci

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo build
        run: cargo build --workspace --locked

      - name: Cargo check
        run: cargo check --workspace --locked

      - name: Cargo test
        run: cargo test --workspace --locked

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  publish:
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install goss
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/goss-org/goss/releases/latest/download/goss-linux-amd64 -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss
          goss --version

      - name: Build image
        run: docker build -t brrpolice-ci:test -f Dockerfile .

      - name: Validate image with goss
        run: goss -g ci/goss/docker-image.yaml validate

      - name: Resolve image name
        if: github.event_name == 'push'
        id: image
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=tag

      - name: Validate publish tag contract
        if: github.event_name == 'push'
        env:
          RESOLVED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          expected_tag="${GITHUB_REF_NAME//\//-}"
          mapfile -t tags < <(printf "%s\n" "$RESOLVED_TAGS" | sed '/^$/d')
          if [ "${#tags[@]}" -ne 1 ]; then
            echo "expected exactly one publish tag, got ${#tags[@]}: ${tags[*]}" >&2
            exit 1
          fi
          actual_ref="${tags[0]}"
          actual_tag="${actual_ref##*:}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "expected publish tag '$expected_tag' but got '$actual_tag'" >&2
            exit 1
          fi

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        if: github.event_name == 'push'
        env:
          RESOLVED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(printf "%s\n" "$RESOLVED_TAGS" | sed '/^$/d')
          for tag in "${tags[@]}"; do
            docker tag brrpolice-ci:test "$tag"
            docker push "$tag"
          done
